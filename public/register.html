<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    /* ===== animated gradient ===== */
    body{
      background: linear-gradient(-45deg,#4f46e5,#7c3aed,#9333ea,#6366f1);
      background-size:400% 400%;
      animation: gradientMove 12s ease infinite;
      transition: background 0.5s ease;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    /* dark mode */
    .dark-mode{
      background:#0f172a !important;
    }

    /* fade animation */
    .fade-in{
      animation: fade 0.6s ease;
    }

    @keyframes fade{
      from{opacity:0; transform:translateY(20px)}
      to{opacity:1; transform:translateY(0)}
    }

    /* click pulse */
    @keyframes pulse{
      0%{transform:scale(0.5)}
      100%{transform:scale(1)}
    }

    /* glow button */
    .btn-glow:hover{
      box-shadow:0 0 20px #22d3ee;
    }
  </style>
</head>


<body id="body" class="text-white flex items-center justify-center h-screen overflow-hidden">

<!-- particles -->
<div id="particles" class="fixed inset-0 -z-10"></div>


<!-- ================= CARD ================= -->
<div class="bg-white/15 backdrop-blur-xl p-8 rounded-2xl shadow-2xl w-96 fade-in">

  <!-- header -->
  <div class="flex justify-between items-center mb-5">
    <h2 class="text-2xl font-bold">Create Account</h2>
    <button type="button" onclick="toggleTheme()" class="text-sm opacity-80 hover:opacity-100">🌙</button>
  </div>


  <!-- FORM (unchanged IDs) -->
  <form id="registerForm" class="space-y-3">

    <!-- username -->
    <input id="username" type="text"
class="w-full p-2 rounded bg-gray-700 text-white caret-white placeholder-white focus:outline-none focus:ring-2 focus:ring-cyan-400"
placeholder="Username">


<!-- email -->
<input id="email" type="email"
class="w-full p-2 rounded bg-gray-700 text-white caret-white placeholder-white focus:outline-none focus:ring-2 focus:ring-cyan-400"
placeholder="Email">

<!-- send otp -->
<button type="button" onclick="sendOTP()"
class="w-full bg-purple-500 py-2 rounded hover:scale-105 transition">
Send OTP
</button>

<!-- otp input -->
<input id="otp"
class="w-full p-2 rounded bg-gray-700 text-white placeholder-white"
placeholder="Enter OTP">

    <!-- upload -->
    <input type="file" id="imageUpload"
      class="text-sm text-white file:bg-cyan-500 file:text-white file:px-3 file:py-1 file:rounded file:border-none cursor-pointer">

    <!-- image preview (IMPORTANT IDs unchanged) -->
    <div class="flex justify-center mt-3">
      <div id="imgBox" class="relative inline-block">
        <img id="preview"
             class="rounded-xl shadow-lg hidden cursor-crosshair max-h-80 block">
      </div>
    </div>

    <!-- undo/clear -->
    <div class="flex gap-3 justify-center mt-3">
      <button type="button" onclick="undoPoint()"
        class="px-4 py-1 rounded bg-yellow-500 hover:scale-105 transition">
        Undo
      </button>

      <button type="button" onclick="clearPoints()"
        class="px-4 py-1 rounded bg-red-500 hover:scale-105 transition">
        Clear
      </button>
    </div>

    <p class="text-sm text-center opacity-90">
      Click 4 secret points
    </p>

    <!-- register button -->
    <button
      class="w-full bg-cyan-500 py-2 rounded-lg hover:scale-105 transition btn-glow">
      Register
    </button>

  </form>
</div>


<!-- ================= SCRIPTS ================= -->

<script src="js/register.js"></script>

<script>
/* dark mode */
function toggleTheme(){
  document.body.classList.toggle("dark-mode");
}

/* particles */
tsParticles.load("particles",{
  particles:{
    number:{value:50},
    size:{value:2},
    move:{speed:1},
    opacity:{value:0.4},
    links:{enable:true}
  }
});
</script>

</body>
</html>

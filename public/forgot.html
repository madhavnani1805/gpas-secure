<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-white/10 p-8 rounded-xl w-80 text-center">

  <h2 class="text-xl mb-4">Forgot Password</h2>

  <!-- email -->
  <input id="email" type="email"
    class="w-full p-2 rounded bg-gray-700 text-white mb-3"
    placeholder="Enter Registered Email">

  <!-- send otp -->
  <button onclick="sendOTP()"
    class="w-full bg-purple-500 py-2 rounded mb-3">
    Send OTP
  </button>

  <!-- otp input -->
  <input id="otp"
    class="w-full p-2 rounded bg-gray-700 text-white mb-3"
    placeholder="Enter OTP">

  <!-- verify -->
  <button onclick="verifyOTP()"
    class="w-full bg-green-500 py-2 rounded">
    Verify OTP
  </button>

</div>

<script src="js/forgot.js"></script>

</body>
</html>
